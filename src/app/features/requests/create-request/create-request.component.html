<app-navbar></app-navbar>
<div class="container" style="padding-top: 32px; max-width: 700px;">
  <div class="page-header">
    <h1>🙋 Post a Help Request</h1>
    <p>Describe what you need help with</p>
  </div>
  <div class="card">
    <div class="alert-error" *ngIf="error">{{error}}</div>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" [(ngModel)]="title" placeholder="e.g. Need help with Spring Boot JPA"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="description" rows="4" placeholder="Describe what you need in detail..."></textarea>
      <button class="ai-btn" (click)="generateDescription()" [disabled]="generatingDesc">
  {{generatingDesc ? '✨ Generating...' : '✨ Generate with AI'}}
</button>
    </div>
    <div class="form-group">
      <label>Skill Needed *</label>
      <select [(ngModel)]="skillId">
        <option [ngValue]="null" disabled>Select a skill</option>
        <option *ngFor="let skill of skills" [ngValue]="skill.id">
          {{skill.name}} ({{skill.category}})
        </option>
      </select>
      <button class="add-skill-btn" (click)="showNewSkill = !showNewSkill">
        + Add new skill
      </button>
    </div>
    <div class="form-group" *ngIf="showNewSkill">
      <label>New Skill Name</label>
      <div class="inline-input">
        <input type="text" [(ngModel)]="newSkillName" placeholder="e.g. Rust Programming"/>
        <button class="btn-primary" (click)="addNewSkill()">Add</button>
      </div>
    </div>
    <div class="form-group">
      <label>Hours Required *</label>
      <input type="number" [(ngModel)]="hoursRequired" min="0.5" max="10" step="0.5" placeholder="e.g. 2"/>
      <small>You need at least this many credits to post</small>
    </div>
    <div class="form-actions">
      <a routerLink="/dashboard" class="btn-secondary">Cancel</a>
      <button class="btn-primary" (click)="submit()" [disabled]="loading">
        {{loading ? 'Posting...' : 'Post Request'}}
      </button>
    </div>
  </div>
</div>
