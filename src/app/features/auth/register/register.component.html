<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>⏰ TimeBank</h1>
      <p>Exchange skills, earn time credits</p>
    </div>
    <h2>Create account</h2>
    <p class="subtitle">Start with 5 free credits 🎉</p>
    <div class="alert-error" *ngIf="error">{{error}}</div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Ritika Sharma"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Min 6 characters"/>
    </div>
    <button class="btn-primary full-width" (click)="register()" [disabled]="loading">
      {{loading ? 'Creating account...' : 'Create Account'}}
    </button>
    <p class="auth-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
