<app-navbar></app-navbar>
<div class="container" style="padding-top: 32px; max-width: 700px;">
  <div class="page-header">
    <h1>🎓 Offer a Session</h1>
    <p>Share your knowledge and earn credits</p>
  </div>

  <div class="credit-guide">
    <h4>💡 Credit Recommendation Guide</h4>
    <div class="guide-grid">
      <div class="guide-item" *ngFor="let g of creditGuide">
        <span class="guide-range">{{g.range}}</span>
        <span class="guide-desc">{{g.desc}}</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="alert-error" *ngIf="error">{{error}}</div>
    <div class="form-group">
      <label>Session Title *</label>
      <input type="text" [(ngModel)]="title" placeholder="e.g. Java Fundamentals for Beginners"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="description" rows="4" placeholder="What will you cover? What will students learn?"></textarea>
    </div>
    <div class="form-group">
      <label>Skill *</label>
      <select [(ngModel)]="skillId">
        <option [ngValue]="null" disabled>Select a skill</option>
        <option *ngFor="let skill of skills" [ngValue]="skill.id">
          {{skill.name}} ({{skill.category}})
        </option>
      </select>
      <button class="add-skill-btn" (click)="showNewSkill = !showNewSkill">+ Add new skill</button>
    </div>
    <div class="form-group" *ngIf="showNewSkill">
      <label>New Skill Name</label>
      <div class="inline-input">
        <input type="text" [(ngModel)]="newSkillName" placeholder="e.g. Rust Programming"/>
        <button class="btn-primary" (click)="addNewSkill()">Add</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Credits (1-10) *</label>
        <input type="number" [(ngModel)]="credits" min="1" max="10" step="1"/>
      </div>
      <div class="form-group">
        <label>Duration (hours) *</label>
        <input type="number" [(ngModel)]="duration" min="0.5" max="5" step="0.5"/>
      </div>
    </div>
    <div class="form-actions">
      <a routerLink="/dashboard" class="btn-secondary">Cancel</a>
      <button class="btn-primary" (click)="submit()" [disabled]="loading">
        {{loading ? 'Creating...' : 'Create Session'}}
      </button>
    </div>
  </div>
</div>
